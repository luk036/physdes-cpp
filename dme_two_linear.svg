<circle cx="400" cy="108.333" r="10" fill="#F44336" stroke="#333" stroke-width="1"/>
<text x="400" y="93.3333" class="node-label" text-anchor="middle">n0</text>
<text x="400" y="130.333" class="delay-label" text-anchor="middle">d:0.0</text>
<circle cx="108.333" cy="108.333" r="8" fill="#4CAF50" stroke="#333" stroke-width="1"/>
